<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PO Chat UI</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }

    #chatbox {
      background: #fff;
      padding: 15px;
      width: 420px;
      height: 520px;
      overflow-y: auto;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    .message {
      margin: 10px 0;
    }

    .user {
      text-align: right;
      color: blue;
    }

    .bot {
      text-align: left;
      color: green;
    }

    input {
      width: 300px;
      padding: 10px;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<h2>PO Chat Assistant</h2>

<div id="chatbox"></div>

<input id="userInput" placeholder="Ask about PO (e.g. GR qty of PO 4500001901 item 10)" />
<button onclick="sendMessage()">Send</button>

<script>
function addMessage(sender, text, cls) {
  const chatbox = document.getElementById("chatbox");

  const div = document.createElement("div");
  div.className = `message ${cls}`;

  const pre = document.createElement("pre");
  pre.textContent = `${sender}: ${text}`;

  div.appendChild(pre);
  chatbox.appendChild(div);

  chatbox.scrollTop = chatbox.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById("userInput");
  const message = input.value.trim();

  if (!message) return;

  addMessage("You", message, "user");
  input.value = "";

  try {
    const res = await fetch("http://localhost:3000/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        query: message   // ✅ IMPORTANT FIX
      })
    });

    const data = await res.json();

    addMessage("Bot", JSON.stringify(data, null, 2), "bot");

  } catch (err) {
    addMessage("Bot", "❌ Backend error or network issue", "bot");
  }
}

// Enter key support
document.getElementById("userInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
